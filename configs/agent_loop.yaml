paper_trading_loop:
  enabled: true
  refresh_interval_seconds: 300
  default_strategy_id: "fixture_momentum_v0"
  order_ticket_ttl_seconds: 300
  queue_path: "runtime/approval_queue.sqlite3"
  paper_state_path: "runtime/paper_portfolio.json"
  managed_by: "fastapi_lifespan_runtime"

dashboard:
  enabled: true
  refresh_interval_seconds: 300
  pid_path: "runtime/alpha_dashboard.pid"
  log_path: "runtime/alpha_dashboard.log"

ops_maintenance:
  enabled: true
  interval_seconds: 300
  backup_interval_seconds: 86400
  max_backup_count: 30
  max_history_rows: 10000
  history_path: "runtime/ops_health_history.jsonl"
  backup_dir: "runtime/backups"
  managed_by: "fastapi_lifespan_runtime"
